spring.application.name=backend

# --- Postgres runtime config (adjust if your container uses different values) ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/workflex_db}
spring.datasource.username=${DB_USER:workflex_user}
spring.datasource.password=${DB_PASSWORD:workflex_secret}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
