<section class="test-page">
  <h1>Test Page</h1>
  <p>Data comes from backend API + PostgreSQL.</p>

  <ul>
    @for (item of (items$ | async) ?? []; track item.id) {
      <li>
        <strong>#{{ item.id }}</strong>
        <span>{{ item.label }}</span>
        <small>{{ item.createdAt | date: 'short' }}</small>
      </li>
    }
  </ul>
</section>
