<main class="page">
  <h1>Workstations</h1>

  <table>
    <colgroup>
      <col class="col-employee" />
      <col class="col-origin" />
      <col class="col-destination" />
      <col class="col-start" />
      <col class="col-end" />
      <col class="col-office" />
      <col class="col-risk" />
    </colgroup>
    <thead>
      <tr>
        <th>
          <button type="button" (click)="sortBy('employee')">
            <span>Employee</span>
            <span class="sort-arrows"><span>▲</span><span>▼</span></span>
          </button>
        </th>
        <th>
          <button type="button" (click)="sortBy('originCountry')">
            <span>Origin</span>
            <span class="sort-arrows"><span>▲</span><span>▼</span></span>
          </button>
        </th>
        <th>
          <button type="button" (click)="sortBy('destinationCountry')">
            <span>Destination</span>
            <span class="sort-arrows"><span>▲</span><span>▼</span></span>
          </button>
        </th>
        <th>
          <button type="button" (click)="sortBy('startDate')">
            <span>Start Date</span>
            <span class="sort-arrows"><span>▲</span><span>▼</span></span>
          </button>
        </th>
        <th>
          <button type="button" (click)="sortBy('endDate')">
            <span>End Date</span>
            <span class="sort-arrows"><span>▲</span><span>▼</span></span>
          </button>
        </th>
        <th>
          <button type="button" (click)="sortBy('officeDays')">
            <span>Office Days</span>
            <span class="sort-arrows"><span>▲</span><span>▼</span></span>
          </button>
        </th>
        <th>
          <button type="button" (click)="sortBy('risk')">
            <span>Risk</span>
            <span class="sort-arrows"><span>▲</span><span>▼</span></span>
          </button>
        </th>
      </tr>
    </thead>
    <tbody>
      @for (row of rows(); track row.workstationId) {
        <tr>
          <td class="cell-employee">{{ row.employee }}</td>
          <td class="cell-secondary"><app-country-cell [country]="row.originCountry" /></td>
          <td class="cell-secondary"><app-country-cell [country]="row.destinationCountry" /></td>
          <td class="cell-date cell-secondary"><app-date-cell [date]="row.startDate" /></td>
          <td class="cell-date cell-secondary"><app-date-cell [date]="row.endDate" /></td>
          <td class="cell-secondary">{{ row.officeDays }}</td>
          <td class="cell-secondary"><app-risk-cell [risk]="row.risk" /></td>
        </tr>
      }
    </tbody>
  </table>
</main>
