<main class="page">
  <h1>Workstations</h1>

  <table>
    <thead>
      <tr>
        <th>
          <button type="button" (click)="sortBy('employee')">
            <span>Employee</span><span class="sort-arrows">▲▼</span>
          </button>
        </th>
        <th>
          <button type="button" (click)="sortBy('originCountry')">
            <span>From</span><span class="sort-arrows">▲▼</span>
          </button>
        </th>
        <th>
          <button type="button" (click)="sortBy('destinationCountry')">
            <span>To</span><span class="sort-arrows">▲▼</span>
          </button>
        </th>
        <th>
          <button type="button" (click)="sortBy('startDate')">
            <span>Start date</span><span class="sort-arrows">▲▼</span>
          </button>
        </th>
        <th>
          <button type="button" (click)="sortBy('endDate')">
            <span>End date</span><span class="sort-arrows">▲▼</span>
          </button>
        </th>
        <th>
          <button type="button" (click)="sortBy('officeDays')">
            <span>Office days</span><span class="sort-arrows">▲▼</span>
          </button>
        </th>
        <th>
          <button type="button" (click)="sortBy('risk')">
            <span>Risk</span><span class="sort-arrows">▲▼</span>
          </button>
        </th>
      </tr>
    </thead>
    <tbody>
      @for (row of rows(); track row.workstationId) {
        <tr>
          <td>{{ row.employee }}</td>
          <td>{{ row.originCountry }}</td>
          <td>{{ row.destinationCountry }}</td>
          <td>{{ row.startDate | date: 'dd/MM/yyyy' }}</td>
          <td>{{ row.endDate | date: 'dd/MM/yyyy' }}</td>
          <td>{{ row.officeDays }}</td>
          <td>
            <span class="risk" [ngClass]="riskClass(row.risk)">
              <img [src]="riskIcon(row.risk)" [alt]="riskLabel(row.risk)" />
              {{ riskLabel(row.risk) }}
            </span>
          </td>
        </tr>
      }
    </tbody>
  </table>
</main>
