name: E2E Pipeline

on:
  pull_request:
  push:
    branches: [main]

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x backend/mvnw

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            e2e-tests/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install E2E dependencies
        working-directory: e2e-tests
        run: npm install

      - name: Install Playwright browsers
        working-directory: e2e-tests
        run: npm run install:browsers

      - name: Start backend
        working-directory: backend
        run: ./mvnw spring-boot:run > ../backend.log 2>&1 &

      - name: Wait for backend readiness
        run: |
          for i in {1..90}; do
            if curl -fsS http://localhost:8080/v3/api-docs > /dev/null; then
              echo "Backend is up"
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become ready"
          cat backend.log || true
          exit 1

      - name: Start frontend
        working-directory: frontend
        run: npm run start -- --host 0.0.0.0 > ../frontend.log 2>&1 &

      - name: Wait for frontend readiness
        run: |
          for i in {1..90}; do
            if curl -fsS http://localhost:4200 > /dev/null; then
              echo "Frontend is up"
              exit 0
            fi
            sleep 2
          done
          echo "Frontend did not become ready"
          cat frontend.log || true
          exit 1

      - name: Run E2E tests
        working-directory: e2e-tests
        env:
          E2E_BASE_URL: http://localhost:4200
        run: npm test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e-tests/playwright-report
          if-no-files-found: warn

      - name: Upload Playwright results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: e2e-tests/test-results
          if-no-files-found: warn

      - name: Upload backend log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-log
          path: backend.log
          if-no-files-found: warn

      - name: Upload frontend log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-log
          path: frontend.log
          if-no-files-found: warn
