name: Quality Pipeline

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend-quality:
    name: Backend - Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run backend tests
        working-directory: backend
        run: ./mvnw -q test

  frontend-quality:
    name: Frontend - Lint, Format, Build, Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Lint SCSS
        working-directory: frontend
        run: npm run lint:scss

      - name: Format check
        working-directory: frontend
        run: npm run format:check

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Unit tests (headless)
        working-directory: frontend
        run: npm run test -- --run --watch=false
