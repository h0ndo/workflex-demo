name: Quality Pipeline

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend-quality:
    name: Backend - Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: workflex_user
          POSTGRES_PASSWORD: workflex_secret
          POSTGRES_DB: workflex_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U workflex_user -d workflex_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x backend/mvnw

      - name: Wait for Postgres readiness
        run: |
          for i in {1..60}; do
            if pg_isready -h localhost -p 5433 -U workflex_user -d workflex_db; then
              echo "Postgres is up"
              exit 0
            fi
            sleep 2
          done
          echo "Postgres did not become ready"
          exit 1

      - name: Run backend tests
        working-directory: backend
        env:
          DB_URL: jdbc:postgresql://localhost:5433/workflex_db
          DB_USER: workflex_user
          DB_PASSWORD: workflex_secret
        run: ./mvnw -q test

  frontend-quality:
    name: Frontend - Lint, Format, Build, Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Lint SCSS
        working-directory: frontend
        run: npm run lint:scss

      - name: Format check
        working-directory: frontend
        run: npm run format:check

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Unit tests (headless)
        working-directory: frontend
        run: npm run test -- --run --watch=false
