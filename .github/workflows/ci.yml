name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend - Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run backend tests
        working-directory: backend
        run: ./mvnw -q test

  frontend:
    name: Frontend - Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint TS/Angular
        working-directory: frontend
        run: npm run lint

      - name: Lint SCSS
        working-directory: frontend
        run: npm run lint:scss

      - name: Prettier check
        working-directory: frontend
        run: npm run format:check

      - name: Build
        working-directory: frontend
        run: npm run build

  contract:
    name: API Contract - OpenAPI -> TS
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Start backend
        working-directory: backend
        run: ./mvnw spring-boot:run > ../backend.log 2>&1 &

      - name: Wait for OpenAPI endpoint
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8080/v3/api-docs > /dev/null; then
              echo "OpenAPI endpoint is up"
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become ready in time"
          echo "--- backend.log ---"
          cat backend.log || true
          exit 1

      - name: Generate and verify API types are committed
        working-directory: frontend
        run: npm run check:api
